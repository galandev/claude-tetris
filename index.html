<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section theme-toggle">
          <span class="label">LIGHT</span>
          <label class="switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section leaderboard-section">
          <span class="label">TOP 5</span>
          <table class="leaderboard-table" id="leaderboard-table">
            <thead>
              <tr><th>#</th><th>Nombre</th><th>Score</th><th>Líneas</th><th>Combo</th></tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
          </table>
          <div class="best-stats">
            <span>Mejor combo: <b id="best-combo-stat">0</b></span>
            <span>Máx líneas: <b id="max-lines-stat">0</b></span>
          </div>
          <button id="reset-records-btn">Reset records</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="gameover-panel" class="hidden">
          <div id="name-entry" class="hidden">
            <p class="label">¡Nuevo récord!</p>
            <input type="text" id="name-input" maxlength="10" placeholder="Tu nombre" autocomplete="off" />
            <button id="save-score-btn">Guardar</button>
          </div>
          <table class="leaderboard-table" id="gameover-leaderboard-table">
            <thead>
              <tr><th>#</th><th>Nombre</th><th>Score</th><th>Líneas</th><th>Combo</th></tr>
            </thead>
            <tbody id="gameover-leaderboard-body"></tbody>
          </table>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
