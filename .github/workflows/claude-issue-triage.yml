name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh issue view:*),Bash(gh label list:*)"'
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repositorio
            (proyecto de Tetris en JavaScript vanilla, sin build ni tests — ver CLAUDE.md
            para arquitectura de game.js, index.html y style.css).

            Pasos:
            1. Ejecuta `gh issue view ${{ github.event.issue.number }}` para leer título y
               cuerpo del issue.
            2. Ejecuta `gh label list` para ver los labels existentes del repositorio.
            3. Elige los labels apropiados **solo entre los labels que ya existen** en el
               repo (no crees labels nuevos) y aplícalos con:
               `gh issue edit ${{ github.event.issue.number }} --add-label "label1,label2"`.
               Si el issue ya edité previamente y ya tiene labels correctos, no dupliques
               ni elimines los existentes salvo que ya no apliquen.
            4. Publica un comentario en el issue con
               `gh issue comment ${{ github.event.issue.number }} --body "..."` que
               contenga un diagnóstico técnico breve:
               - Naturaleza del problema (bug, mejora, pregunta, etc.).
               - Área probable del código afectada (qué función/sección de game.js,
                 index.html o style.css según la arquitectura descrita en CLAUDE.md).
               - Causa probable si es un bug, o enfoque sugerido si es una mejora.
               - Este diagnóstico debe servir como base para implementar la solución
                 después, así que sé concreto y técnico, no genérico.
               - El comentario debe estar redactado en formato Markdown válido y
                 correctamente interpretable por GitHub (encabezados, listas,
                 bloques de código con \`\`\` y referencias a archivos/funciones con
                 backticks, etc.).
